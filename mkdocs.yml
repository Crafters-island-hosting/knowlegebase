site_name: Crafters Island — Knowledgebase
site_description: Documentation and knowledge base for Crafters Island
site_url: https://crafters-island.com
repo_url: https://github.com/Crafters-island-hosting/knowlegebase
nav:
  - Home: index.md

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - scheme: default
      primary: 'custom'
      primaryColor: '#0b74de'
      accent: 'custom'
      accentColor: '#ffb400'
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.tabs.link

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      fallback_to_build_date: true
  - minify:
      minify_html: true
  - glightbox
  - redirects

# Custom footer links for Material theme
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/JY2NtBc8yG
      name: Support Server
    - icon: fontawesome/solid/globe
      link: https://crafters-island.com
      name: Main Site
    - icon: fontawesome/solid/heart-pulse
      link: https://panels-status.crafters-island.com/
      name: Status Page
    - icon: fontawesome/solid/file-contract
      link: https://client.crafters-island.com/terms/tos
      name: Terms of Service
    - icon: fontawesome/solid/user-shield
      link: https://client.crafters-island.com/terms/privacy
      name: Privacy Policy
  footer:
    html: |
      <div class="ci-footer-links">
        <a href="https://crafters-island.com" target="_blank">Main site</a> |
        <a href="https://discord.gg/JY2NtBc8yG" target="_blank">Support server</a> |
        <a href="https://panels-status.crafters-island.com/" target="_blank">Status page</a> |
        <a href="https://client.crafters-island.com/terms/tos" target="_blank">ToS</a> |
        <a href="https://client.crafters-island.com/terms/privacy" target="_blank">Privacy Policy</a>
      </div>
